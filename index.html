<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Jesus Is King II</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #111;
      color: white;
      text-align: center;
    }

    #player {
      padding: 20px;
    }

    #cover {
      width: 250px;
      height: 250px;
      object-fit: cover;
      margin-top: 10px;
      border-radius: 10px;
    }

    .song {
      padding: 10px;
      margin: 5px auto;
      width: 60%;
      background: #222;
      cursor: pointer;
      border-radius: 5px;
    }

    .song:hover {
      background: #333;
    }

    button {
      margin: 10px;
      padding: 10px 15px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div id="player">

  <!-- BACK BUTTON -->
  <button onclick="goBack()">⬅ Back to Library</button>

  <!-- ALBUM INFO -->
  <h1 id="albumTitle">Album Title</h1>
  <img id="cover" src="" alt="cover">

  <!-- SONG LIST -->
  <div id="songs"></div>

</div>

<audio id="audio"></audio>

<button id="playPauseBtn" onclick="togglePlay()">▶️ Play</button>

<script>

let currentAlbum = {
  name: "Jesus Is King II",
  cover: "jesusiskingiicover.jpg",
  songs: [
      { file: "dontgiveup.mp3", title: "Don't Give Up", artist: "Kanye West, CyHi the Prynce" },
      { file: "thisistheglory.mp3", title: "This Is The Glory", artist: "Kanye West, Snoop Dogg, Dr. Dre, Dem Jointz" },
      { file: "wakethedead.mp3", title: "Wake The Dead", artist: "Kanye West" },
      { file: "findaway.mp3", title: "Find A Way", artist: "Kanye West" },
      { file: "bound3thisistheday.mp3", title: "Bound 3/This Is The Day", artist: "Kanye West, Consequence" },
      { file: "handsonremix.mp3", title: "Hands On (Remix)", artist: "Kanye West, Travis Scott" },
      { file: "alldreamsreal.mp3", title: "All Dreams Real", artist: "Kanye West" },
      {
        title: "LA Monster",
        versions: [
      {
        version: "V12",
        file: "lamonsterv12.mp3",
        artist: "Kanye West, A$AP Ferg"
      },
      {
        version: "V10",
        file: "lamonsterv10.mp3",
        artist: "Kanye West"
      }
    ]
  },
      { file: "upfromtheashesv20.mp3", title: "Up From The Ashes", artist: "Kanye West, Sunday Service Choir, Marsha Ambrosius, Anderson .Paak" }
  ]
};

// BACK BUTTON (PUT MAIN REPO LINK HERE)
function goBack() {
  window.location.href = "https://peace345.github.io/Ye-Unreleased-Archive/"; // <-- paste main library repo URL here
}

// LOAD ALBUM
document.getElementById("albumTitle").innerText = currentAlbum.name;
document.getElementById("cover").src = currentAlbum.cover;

buildSongs();

// BUILD SONG LIST
function buildSongs() {
  const songsDiv = document.getElementById("songs");
  songsDiv.innerHTML = "";

  currentAlbum.songs.forEach((song, i) => {

    // SONG WITH MULTIPLE VERSIONS
    if (song.versions) {

      const group = document.createElement("div");
      group.className = "song";

      group.innerHTML = `<strong>${song.title} ▼</strong>`;

      group.onclick = () => {

  if (group.dataset.opened) {

    group.dataset.opened = "";

    document.querySelectorAll(`.version-${i}`).forEach(div => {
      div.remove();
    });

    group.innerHTML = `<strong>${song.title} ▼</strong>`;

  } else {

    group.dataset.opened = true;

    song.versions.forEach(version => {

      const div = document.createElement("div");
      div.className = `song version-${i}`;

      div.innerHTML = `
        <div style="display:flex; align-items:center;">
          <div style="width:60px;">
            <strong>${version.version}</strong>
          </div>

          <div style="flex:1; text-align:center;">
            <strong>${song.title}</strong><br>
            <small>${version.artist}</small>
          </div>
        </div>
      `;

      div.onclick = (e) => {
        e.stopPropagation();

        window.audio.src = version.file;
        window.audio.play();

        updateMediaSession({
          title: song.title,
          artist: version.artist
        });
      };

      group.after(div);

    });

    group.innerHTML = `<strong>${song.title} ▲</strong>`;
  }

};

    // NORMAL SONG
    else {

      const div = document.createElement("div");
      div.className = "song";

      div.innerHTML = `
        <strong>${song.title}</strong><br>
        <small>${song.artist || ""}</small>
      `;

      div.onclick = () => playSong(i);

      songsDiv.appendChild(div);

    }

  });

}

// PLAY SONG
function playSong(i) {
  currentIndex = i;

  const song = currentAlbum.songs[i];

  window.audio.src = song.file;
  window.audio.play();

  updateMediaSession(song, currentAlbum);
}

function updateMediaSession(song) {
  if (!('mediaSession' in navigator)) return;

  navigator.mediaSession.metadata = new MediaMetadata({
    title: song.title,
    artist: song.artist,
    album: currentAlbum.name,
    artwork: [
      { src: currentAlbum.cover, sizes: "512x512", type: "image/jpg" }
    ]
  });

  navigator.mediaSession.setActionHandler("play", () => {
    audio.play();
  });

  navigator.mediaSession.setActionHandler("pause", () => {
    audio.pause();
  });

  navigator.mediaSession.setActionHandler("previoustrack", () => {
    if (!currentAlbum) return;
    currentIndex = (currentIndex - 1 + currentAlbum.songs.length) % currentAlbum.songs.length;
    playSong(currentIndex);
  });

  navigator.mediaSession.setActionHandler("nexttrack", () => {
    if (!currentAlbum) return;
    currentIndex = (currentIndex + 1) % currentAlbum.songs.length;
    playSong(currentIndex);
  });
}

  if ("mediaSession" in navigator) {

  navigator.mediaSession.setActionHandler("play", async () => {
    await audio.play();
  });

  navigator.mediaSession.setActionHandler("pause", () => {
    audio.pause();
  });

}

function togglePlay() {
  if (audio.paused) {
    audio.play();
  } else {
    audio.pause();
  }
}

  audio.addEventListener("play", () => {
  document.getElementById("playPauseBtn").innerText = "⏸️ Pause";
});

audio.addEventListener("pause", () => {
  document.getElementById("playPauseBtn").innerText = "▶️ Play";
});

window.addEventListener("DOMContentLoaded", () => {

  const audio = document.getElementById("audio");

  audio.addEventListener("ended", () => {
    if (!currentAlbum) return;

    const nextIndex = currentIndex + 1;

    if (nextIndex < currentAlbum.songs.length) {
      playSong(nextIndex);
    } else {
      playSong(0);
    }
  });

  // expose audio globally so playSong can use it safely
  window.audio = audio;
});
  
</script>

</body>
</html>
